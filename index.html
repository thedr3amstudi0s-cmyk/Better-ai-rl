<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Mobile RL AI</title>

<style>
  body {
    margin:0;
    background:#000;
    color:white;
    font-family:Arial;
    overflow:hidden;
    touch-action:none;
  }

  #ui {
    position:fixed;
    top:10px;
    left:10px;
    right:10px;
    background:rgba(0,0,0,0.7);
    padding:12px;
    border-radius:10px;
    font-size:14px;
  }

  #stats, #brain {
    margin-top:6px;
  }

  canvas#graph {
    width:100%;
    height:80px;
    margin-top:8px;
    background:#111;
    border-radius:6px;
  }

  #controls {
    margin-top:8px;
    display:flex;
    gap:6px;
  }

  button {
    flex:1;
    padding:10px;
    font-size:14px;
    border:none;
    border-radius:6px;
    background:#333;
    color:white;
  }

  button:active {
    background:#555;
  }
</style>

</head>
<body>

<div id="ui">
  <div id="controls">
    <button onclick="toggleTraining()">Start/Stop</button>
    <button onclick="resetAll()">Reset</button>
  </div>

  <div id="stats"></div>
  <div id="brain"></div>

<canvas id="graph"></canvas>

</div>

<canvas id="game"></canvas>

<script>
// ============================
// MOBILE DETECTION
// ============================
const isMobile = /Mobi|Android/i.test(navigator.userAgent);

// ============================
// CANVAS
// ============================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// ============================
// WORLD
// ============================
const SIZE = Math.min(window.innerWidth, window.innerHeight);
const AGENT_COUNT = isMobile ? 12 : 25;

let goal = {
  x: Math.random()*SIZE,
  y: Math.random()*SIZE
};

// ============================
// AGENTS
// ============================
const agents = [];

function createAgent(){
  return {
    x: SIZE/2,
    y: SIZE/2,
    angle: Math.random()*Math.PI*2,
    speed: isMobile ? 1.6 : 2
  };
}

for(let i=0;i<AGENT_COUNT;i++){
  agents.push(createAgent());
}

// ============================
// RL
// ============================
let Q = {};
const actions = ["forward","left","right"];

let alpha=0.12, gamma=0.9, epsilon=0.3;
let training = true;

function toggleTraining(){
  training = !training;
}

function resetAll(){
  agents.forEach(a=>{
    a.x = SIZE/2;
    a.y = SIZE/2;
  });
  goal.x = Math.random()*SIZE;
  goal.y = Math.random()*SIZE;
}

function getState(a){
  let dx = goal.x - a.x;
  let dy = goal.y - a.y;

  let dist = Math.hypot(dx,dy);
  let diff = Math.atan2(dy,dx) - a.angle;

  let lookX = a.x + Math.cos(a.angle)*20;
  let lookY = a.y + Math.sin(a.angle)*20;

  let danger = (lookX<0||lookX>SIZE||lookY<0||lookY>SIZE)?1:0;

  return `${Math.round(dist/20)}_${Math.round(diff*4)}_${danger}`;
}

function chooseAction(state){
  if(Math.random()<epsilon) return actions[Math.floor(Math.random()*3)];
  let qs = Q[state]||{};
  return actions.reduce((a,b)=>(qs[a]||0)>(qs[b]||0)?a:b);
}

function step(a,action){
  let prevDist = Math.hypot(goal.x-a.x, goal.y-a.y);

  if(action==="left") a.angle -= 0.2;
  if(action==="right") a.angle += 0.2;

  if(action==="forward"){
    a.x += Math.cos(a.angle)*a.speed;
    a.y += Math.sin(a.angle)*a.speed;
  }

  let newDist = Math.hypot(goal.x-a.x, goal.y-a.y);

  let reward = (prevDist - newDist)*2;

  let diff = Math.abs(Math.atan2(goal.y-a.y, goal.x-a.x) - a.angle);
  reward += (Math.PI - diff);

  if(a.x<10||a.x>SIZE-10||a.y<10||a.y>SIZE-10) reward -= 2;

  if(a.x<0||a.x>SIZE||a.y<0||a.y>SIZE){
    return {reward:-30, done:true};
  }

  if(newDist < 10){
    return {reward:40, done:true};
  }

  return {reward, done:false};
}

// ============================
// GRAPH
// ============================
const graph = document.getElementById("graph");
const gctx = graph.getContext("2d");

function resizeGraph(){
  graph.width = graph.clientWidth;
  graph.height = graph.clientHeight;
}
resizeGraph();
window.addEventListener("resize", resizeGraph);

let rewards = [];

function drawGraph(){
  gctx.clearRect(0,0,graph.width,graph.height);

  gctx.beginPath();
  for(let i=0;i<rewards.length;i++){
    let x = i;
    let y = graph.height - rewards[i];
    if(i===0) gctx.moveTo(x,y);
    else gctx.lineTo(x,y);
  }
  gctx.strokeStyle="lime";
  gctx.stroke();
}

// ============================
// LOOP
// ============================
let episodes = 0;
let lastDebug = {};

function update(){
  if(!training) return;

  agents.forEach(a=>{
    let s = getState(a);
    let act = chooseAction(s);

    let res = step(a,act);
    let s2 = getState(a);

    if(!Q[s]) Q[s]={};

    let old = Q[s][act]||0;
    let nextMax = Q[s2]?Math.max(...actions.map(x=>Q[s2][x]||0)):0;

    Q[s][act] = old + alpha*(res.reward + gamma*nextMax - old);

    lastDebug = {state:s, action:act, q:Q[s]};

    rewards.push(res.reward);
    if(rewards.length>graph.width) rewards.shift();

    if(res.done){
      episodes++;
      a.x = SIZE/2;
      a.y = SIZE/2;
    }
  });

  epsilon*=0.999;
  if(epsilon<0.05) epsilon=0.05;
}

function draw(){
  ctx.fillStyle="#111";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // goal
  ctx.fillStyle="lime";
  ctx.fillRect(goal.x,goal.y,12,12);

  // agents
  ctx.fillStyle="cyan";
  agents.forEach(a=>{
    ctx.fillRect(a.x,a.y,6,6);
  });
}

function loop(){
  update();
  draw();
  drawGraph();

  document.getElementById("stats").innerHTML =
    `Agents: ${AGENT_COUNT}<br>Episodes: ${episodes}<br>Epsilon: ${epsilon.toFixed(2)}`;

  document.getElementById("brain").innerHTML =
    `Action: ${lastDebug.action || ""}`;

  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
