<!DOCTYPE html>
<html>
<head>
  <title>RL Cube Learner Mobile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    html, body { margin:0; padding:0; overflow:hidden; touch-action:none; }
    #ui {
      position:absolute; top:5px; left:5px; color:white; font-family:Arial;
      background:rgba(0,0,0,0.5); padding:8px; border-radius:5px;
      font-size:14px;
    }
    button { padding:10px; margin:2px; font-size:16px; }
    pre { margin:0; }
  </style>
</head>
<body>
<div id="ui">
  <button onclick="training=!training">Start/Stop</button>
  <div id="info"><pre></pre></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
<script type="module">
import * as THREE from "https://cdn.skypack.dev/three@0.158.0";

// ============================
// SCENE
// ============================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(5,8,10);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// light
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,7);
scene.add(light);

// ============================
// FLOOR
// ============================
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(20,20),
  new THREE.MeshStandardMaterial({color:0x222222})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// ============================
// AGENT
// ============================
const cube = new THREE.Mesh(
  new THREE.BoxGeometry(0.6,0.6,0.6),
  new THREE.MeshStandardMaterial({color:0x00ffff})
);
scene.add(cube);

// ============================
// TEST LOOP
// ============================
function animate(){
  requestAnimationFrame(animate);
  cube.rotation.y += 0.01;
  renderer.render(scene,camera);
}
animate();

// resize fix
window.addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
