<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>RL Cube AI (Working)</title>
<style>
  body { margin:0; overflow:hidden; background:#000; font-family:Arial; }
  #ui {
    position:absolute;
    top:10px; left:10px;
    color:white;
    background:rgba(0,0,0,0.5);
    padding:12px;
    border-radius:10px;
  }
  button {
    padding:8px 12px;
    margin:4px;
    cursor:pointer;
  }
</style>
</head>
<body>

<div id="ui">
  <button onclick="toggleTraining()">Start / Stop</button>
  <button onclick="resetAgent()">Reset</button>
  <div id="stats">Loading...</div>
</div>

<script type="module">
import * as THREE from "https://cdn.skypack.dev/three@0.158.0";

// ============================
// SCENE
// ============================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(6,8,10);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// light
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,7);
scene.add(light);

// ============================
// PLATFORM
// ============================
const platform = new THREE.Mesh(
  new THREE.BoxGeometry(20,0.5,20),
  new THREE.MeshStandardMaterial({color:0x222222})
);
platform.position.y = -0.25;
scene.add(platform);

// ============================
// AGENT + GOAL
// ============================
const cube = new THREE.Mesh(
  new THREE.BoxGeometry(0.6,0.6,0.6),
  new THREE.MeshStandardMaterial({color:0x00ffff})
);
scene.add(cube);

const goal = new THREE.Mesh(
  new THREE.BoxGeometry(1,0.2,1),
  new THREE.MeshStandardMaterial({color:0x00ff00})
);
scene.add(goal);

// ============================
// AGENT DATA
// ============================
let agent = {
  x:0, z:0,
  angle:0,
  speed:0.08
};

function resetAgent(){
  agent.x = 0;
  agent.z = 0;
  agent.angle = Math.random()*Math.PI*2;

  goal.position.set(
    (Math.random()*16)-8,
    0.1,
    (Math.random()*16)-8
  );
}

// ============================
// RL
// ============================
let Q = {};
const actions = ["forward","left","right"];

let alpha = 0.1;
let gamma = 0.9;
let epsilon = 0.25;

function getState(){
  let dx = goal.position.x - agent.x;
  let dz = goal.position.z - agent.z;

  let dist = Math.sqrt(dx*dx + dz*dz);
  let angleToGoal = Math.atan2(dz,dx);
  let diff = angleToGoal - agent.angle;

  return `${Math.round(dist)}_${Math.round(diff*5)}`;
}

function chooseAction(state){
  if(Math.random()<epsilon){
    return actions[Math.floor(Math.random()*3)];
  }
  let qs = Q[state]||{};
  return actions.reduce((a,b)=>(qs[a]||0)>(qs[b]||0)?a:b);
}

function step(action){
  let prevDist = dist();

  if(action==="left") agent.angle -= 0.25;
  if(action==="right") agent.angle += 0.25;

  if(action==="forward"){
    agent.x += Math.cos(agent.angle)*agent.speed;
    agent.z += Math.sin(agent.angle)*agent.speed;
  }

  let newDist = dist();
  let reward = (prevDist - newDist)*5;

  // FALL = DEATH
  if(Math.abs(agent.x)>10 || Math.abs(agent.z)>10){
    return {reward:-30, done:true};
  }

  // GOAL
  if(newDist < 0.6){
    return {reward:50, done:true};
  }

  return {reward, done:false};
}

function dist(){
  let dx = goal.position.x - agent.x;
  let dz = goal.position.z - agent.z;
  return Math.sqrt(dx*dx + dz*dz);
}

// ============================
// TRAIN LOOP
// ============================
let training = true;
let episode = 0;

function toggleTraining(){
  training = !training;
}

function updateRL(){
  if(!training) return;

  let s = getState();
  let a = chooseAction(s);

  let result = step(a);
  let s2 = getState();

  if(!Q[s]) Q[s] = {};

  let old = Q[s][a] || 0;
  let nextMax = Q[s2] ? Math.max(...actions.map(x=>Q[s2][x]||0)) : 0;

  Q[s][a] = old + alpha*(result.reward + gamma*nextMax - old);

  if(result.done){
    episode++;
    resetAgent();
  }
}

// ============================
// RENDER LOOP
// ============================
function animate(){
  requestAnimationFrame(animate);

  updateRL();

  cube.position.set(agent.x,0.3,agent.z);
  cube.rotation.y = -agent.angle;

  camera.lookAt(cube.position);

  document.getElementById("stats").innerHTML =
    "Episodes: " + episode + "<br>" +
    "Epsilon: " + epsilon.toFixed(2);

  renderer.render(scene,camera);
}
animate();

window.addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

// start
resetAgent();
</script>

</body>
</html>
