<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neural RL AI (Mobile)</title>

<style>
body { margin:0; background:#000; color:white; font-family:Arial; overflow:hidden; }

#ui {
  position:fixed;
  top:10px;
  left:10px;
  right:10px;
  background:rgba(0,0,0,0.7);
  padding:10px;
  border-radius:10px;
}

button {
  padding:10px;
  margin-right:5px;
  border:none;
  border-radius:6px;
  background:#333;
  color:white;
}

#bars {
  display:flex;
  gap:4px;
  margin-top:6px;
}
.bar {
  flex:1;
  background:#333;
  height:40px;
  position:relative;
}
.bar div {
  position:absolute;
  bottom:0;
  width:100%;
  background:lime;
}

canvas#graph {
  width:100%;
  height:80px;
  margin-top:6px;
  background:#111;
}
</style>

</head>

<body>

<div id="ui">
  <button onclick="toggleTraining()">Start/Stop</button>
  <button onclick="resetAll()">Reset</button>

  <div id="stats"></div>

  <div id="bars">
    <div class="bar"><div id="b0"></div></div>
    <div class="bar"><div id="b1"></div></div>
    <div class="bar"><div id="b2"></div></div>
  </div>

<canvas id="graph"></canvas>

</div>

<canvas id="game"></canvas>

<script>
// ============================
// MOBILE SETUP
// ============================
const isMobile = /Mobi|Android/i.test(navigator.userAgent);

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// ============================
// WORLD
// ============================
const SIZE = Math.min(window.innerWidth, window.innerHeight);
const AGENTS = isMobile ? 12 : 25;

let goal = { x: SIZE/2, y: SIZE/2 };

// ============================
// AGENTS
// ============================
const agents = [];

function createAgent(){
  return {
    x: SIZE/2,
    y: SIZE/2,
    angle: Math.random()*Math.PI*2,
    speed: isMobile ? 1.5 : 2,
    z:0, vy:0
  };
}
for(let i=0;i<AGENTS;i++) agents.push(createAgent());

// ============================
// SIMPLE NEURAL NETWORK
// ============================
const INPUTS = 4;
const HIDDEN = 8;
const OUTPUTS = 3;

// weights
let W1 = Array(INPUTS).fill().map(()=>Array(HIDDEN).fill().map(()=>Math.random()*2-1));
let W2 = Array(HIDDEN).fill().map(()=>Array(OUTPUTS).fill().map(()=>Math.random()*2-1));

function relu(x){ return Math.max(0,x); }
function softmax(arr){
  let max = Math.max(...arr);
  let exps = arr.map(v=>Math.exp(v-max));
  let sum = exps.reduce((a,b)=>a+b,0);
  return exps.map(v=>v/sum);
}

function forward(input){
  let hidden = [];

  for(let j=0;j<HIDDEN;j++){
    let sum = 0;
    for(let i=0;i<INPUTS;i++) sum += input[i]*W1[i][j];
    hidden[j] = relu(sum);
  }

  let output = [];
  for(let k=0;k<OUTPUTS;k++){
    let sum = 0;
    for(let j=0;j<HIDDEN;j++) sum += hidden[j]*W2[j][k];
    output[k] = sum;
  }

  return softmax(output);
}

// ============================
// STATE
// ============================
function getInput(a){
  let dx = (goal.x - a.x)/SIZE;
  let dy = (goal.y - a.y)/SIZE;

  let dist = Math.hypot(dx,dy);
  let angle = Math.atan2(dy,dx) - a.angle;

  let danger = (
    a.x<20||a.x>SIZE-20||
    a.y<20||a.y>SIZE-20
  ) ? 1 : 0;

  return [dx, dy, angle/Math.PI, danger];
}

// ============================
// ACTION
// ============================
function choose(probs){
  let r = Math.random();
  let sum = 0;
  for(let i=0;i<probs.length;i++){
    sum += probs[i];
    if(r<sum) return i;
  }
  return 0;
}

// ============================
// STEP
// ============================
function step(a,action){
  let prevDist = Math.hypot(goal.x-a.x,goal.y-a.y);

  if(action===1) a.angle -= 0.2;
  if(action===2) a.angle += 0.2;

  if(action===0){
    a.x += Math.cos(a.angle)*a.speed;
    a.y += Math.sin(a.angle)*a.speed;
  }

  let newDist = Math.hypot(goal.x-a.x,goal.y-a.y);

  let reward = (prevDist - newDist)*4;

  if(a.x<0||a.x>SIZE||a.y<0||a.y>SIZE){
    a.vy+=0.5;
    a.z+=a.vy;
    if(a.z>100) return {reward:-30, done:true};
    return {reward:-5, done:false};
  }

  if(newDist < 10) return {reward:50, done:true};

  return {reward, done:false};
}

// ============================
// TRAIN
// ============================
let lr = 0.01;
let epsilon = 0.2;
let training = true;

function toggleTraining(){ training=!training; }

function resetAll(){
  agents.forEach(a=>{
    a.x=SIZE/2;
    a.y=SIZE/2;
    a.z=0;
    a.vy=0;
  });
}

function train(input, action, reward){
  let probs = forward(input);

  for(let i=0;i<HIDDEN;i++){
    for(let j=0;j<OUTPUTS;j++){
      W2[i][j] += lr * reward * ( (j===action?1:0) - probs[j] );
    }
  }
}

// ============================
// GRAPH
// ============================
const graph = document.getElementById("graph");
const gctx = graph.getContext("2d");

function resizeGraph(){
  graph.width = graph.clientWidth;
  graph.height = graph.clientHeight;
}
resizeGraph();
window.addEventListener("resize", resizeGraph);

let history=[];

function drawGraph(){
  gctx.clearRect(0,0,graph.width,graph.height);

  gctx.beginPath();
  for(let i=0;i<history.length;i++){
    let y = graph.height - history[i];
    if(i===0) gctx.moveTo(i,y);
    else gctx.lineTo(i,y);
  }
  gctx.strokeStyle="cyan";
  gctx.stroke();
}

// ============================
// LOOP
// ============================
let episodes=0;
let lastProbs=[0,0,0];

function update(){
  if(!training) return;

  let total=0;

  agents.forEach(a=>{
    let input = getInput(a);
    let probs = forward(input);
    let action = choose(probs);

    let res = step(a,action);

    train(input,action,res.reward);

    total += res.reward;
    lastProbs = probs;

    if(res.done){
      episodes++;
      a.x=SIZE/2; a.y=SIZE/2; a.z=0; a.vy=0;
    }
  });

  history.push(total/AGENTS);
  if(history.length>graph.width) history.shift();

  epsilon*=0.999;
}

// ============================
// DRAW
// ============================
function draw(){
  ctx.fillStyle="#111";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.strokeStyle="#444";
  ctx.strokeRect(0,0,SIZE,SIZE);

  ctx.fillStyle="lime";
  ctx.fillRect(goal.x,goal.y,12,12);

  agents.forEach(a=>{
    ctx.fillStyle = a.z>0 ? "red":"cyan";
    ctx.fillRect(a.x,a.y,6,6);
  });
}

// ============================
// UI
// ============================
function updateUI(){
  document.getElementById("stats").innerHTML =
    `Agents: ${AGENTS} | Episodes: ${episodes}`;

  lastProbs.forEach((p,i)=>{
    document.getElementById("b"+i).style.height = (p*40)+"px";
  });
}

// ============================
// MAIN LOOP
// ============================
function loop(){
  update();
  draw();
  drawGraph();
  updateUI();
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
