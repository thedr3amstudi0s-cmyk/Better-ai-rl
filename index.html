<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>RL AI (No CDN, Works Everywhere)</title>
<style>
  body { margin:0; background:#000; color:white; font-family:Arial; }
  #ui {
    position:absolute;
    top:10px; left:10px;
    background:rgba(0,0,0,0.7);
    padding:10px;
    border-radius:8px;
  }
  canvas { display:block; }
</style>
</head>
<body>

<div id="ui">
  <b>AI Brain</b><br>
  <div id="brain"></div><br>

<b>Stats</b><br>

  <div id="stats"></div>

<canvas id="graph" width="250" height="100"></canvas>

</div>

<canvas id="game"></canvas>

<script>
// ============================
// CANVAS SETUP
// ============================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ============================
// WORLD
// ============================
const SIZE = 400;
const AGENT_COUNT = 25;

let goal = {
  x: Math.random()*SIZE,
  y: Math.random()*SIZE
};

// ============================
// AGENTS
// ============================
const agents = [];

function createAgent(){
  return {
    x: SIZE/2,
    y: SIZE/2,
    angle: Math.random()*Math.PI*2,
    speed: 2
  };
}

for(let i=0;i<AGENT_COUNT;i++){
  agents.push(createAgent());
}

// ============================
// RL
// ============================
let Q = {};
const actions = ["forward","left","right"];

let alpha=0.12, gamma=0.9, epsilon=0.3;

function getState(a){
  let dx = goal.x - a.x;
  let dy = goal.y - a.y;

  let dist = Math.hypot(dx,dy);
  let angleToGoal = Math.atan2(dy,dx);
  let diff = angleToGoal - a.angle;

  let lookX = a.x + Math.cos(a.angle)*20;
  let lookY = a.y + Math.sin(a.angle)*20;

  let danger = (
    lookX < 0 || lookX > SIZE ||
    lookY < 0 || lookY > SIZE
  ) ? 1 : 0;

  return `${Math.round(dist/20)}_${Math.round(diff*4)}_${danger}`;
}

function chooseAction(state){
  if(Math.random()<epsilon) return actions[Math.floor(Math.random()*3)];
  let qs = Q[state]||{};
  return actions.reduce((a,b)=>(qs[a]||0)>(qs[b]||0)?a:b);
}

function step(a,action){
  let prevDist = Math.hypot(goal.x-a.x, goal.y-a.y);

  if(action==="left") a.angle -= 0.2;
  if(action==="right") a.angle += 0.2;

  if(action==="forward"){
    a.x += Math.cos(a.angle)*a.speed;
    a.y += Math.sin(a.angle)*a.speed;
  }

  let newDist = Math.hypot(goal.x-a.x, goal.y-a.y);

  let reward = (prevDist - newDist)*2;

  let angleToGoal = Math.atan2(goal.y-a.y, goal.x-a.x);
  let diff = Math.abs(angleToGoal - a.angle);
  reward += (Math.PI - diff);

  // edges
  if(a.x<10||a.x>SIZE-10||a.y<10||a.y>SIZE-10) reward -= 2;

  // death
  if(a.x<0||a.x>SIZE||a.y<0||a.y>SIZE){
    return {reward:-30, done:true};
  }

  // goal
  if(newDist < 10){
    return {reward:40, done:true};
  }

  return {reward, done:false};
}

// ============================
// GRAPH
// ============================
const graph = document.getElementById("graph");
const gctx = graph.getContext("2d");
let rewards = [];

function drawGraph(){
  gctx.clearRect(0,0,250,100);
  gctx.beginPath();
  for(let i=0;i<rewards.length;i++){
    let y = 100 - rewards[i];
    if(i===0) gctx.moveTo(i,y);
    else gctx.lineTo(i,y);
  }
  gctx.strokeStyle="lime";
  gctx.stroke();
}

// ============================
// LOOP
// ============================
let episodes = 0;
let lastDebug = {};

function update(){
  agents.forEach(a=>{
    let s = getState(a);
    let act = chooseAction(s);

    let res = step(a,act);
    let s2 = getState(a);

    if(!Q[s]) Q[s]={};

    let old = Q[s][act]||0;
    let nextMax = Q[s2]?Math.max(...actions.map(x=>Q[s2][x]||0)):0;

    Q[s][act] = old + alpha*(res.reward + gamma*nextMax - old);

    lastDebug = {state:s, action:act, q:Q[s]};

    rewards.push(res.reward);
    if(rewards.length>250) rewards.shift();

    if(res.done){
      episodes++;
      a.x = SIZE/2;
      a.y = SIZE/2;
    }
  });

  epsilon*=0.999;
  if(epsilon<0.05) epsilon=0.05;
}

// ============================
// DRAW
// ============================
function draw(){
  ctx.fillStyle="#111";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // goal
  ctx.fillStyle="lime";
  ctx.fillRect(goal.x,goal.y,10,10);

  // agents
  ctx.fillStyle="cyan";
  agents.forEach(a=>{
    ctx.fillRect(a.x,a.y,5,5);
  });
}

// ============================
// MAIN LOOP
// ============================
function loop(){
  update();
  draw();
  drawGraph();

  document.getElementById("stats").innerHTML =
    `Agents: ${AGENT_COUNT}<br>Episodes: ${episodes}<br>Epsilon: ${epsilon.toFixed(2)}`;

  document.getElementById("brain").innerHTML =
    `State: ${lastDebug.state || ""}<br>
     Action: ${lastDebug.action || ""}<br>
     Q: ${JSON.stringify(lastDebug.q || {}, null, 1)}`;

  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
