<!DOCTYPE html>
<html>
<head>
  <title>RL Cube Learner</title>
  <style>
    body { margin:0; overflow:hidden; background:#000; }
    #ui { position:absolute; top:10px; left:10px; color:white; font-family:Arial; }
    button { padding:8px; margin:3px; }
  </style>
</head>
<body>
<div id="ui">
  <button onclick="training = !training;">Start/Stop Training</button>
  <div id="info">Training...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
<script>
// ======== THREE.JS SETUP ========
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,8,10);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,7);
scene.add(light);

// ======== FLOOR ========
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(20,20),
  new THREE.MeshStandardMaterial({color:0x222222})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// ======== PLATFORMS ========
const platforms = [];
function makePlatform(x,z,y=0){
  const p = new THREE.Mesh(
    new THREE.BoxGeometry(2,0.5,2),
    new THREE.MeshStandardMaterial({color:0x3333aa})
  );
  p.position.set(x,y,z);
  scene.add(p);
  platforms.push(p);
}
makePlatform(0,0,0);
makePlatform(3,0,1);
makePlatform(6,1,2);
makePlatform(9,2,3);

// ======== GOAL ========
const goal = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0x00ff00})
);
goal.position.set(9,3.5,3);
scene.add(goal);

// ======== AGENT ========
const cube = new THREE.Mesh(
  new THREE.BoxGeometry(0.7,0.7,0.7),
  new THREE.MeshStandardMaterial({color:0x00ffff})
);
scene.add(cube);

let agent = {x:0,y:2,z:0,vx:0,vy:0,vz:0,onGround:false};
let training = true;

// ======== Q-LIKE FUNCTION ========
function simpleQ(state){ // state: [dx,dy,dz,vx,vy,vz]
  // tiny NN-like approximation
  return [
    state[0]*0.3 - state[3]*0.2, // forward
    state[0]*0.2 - state[5]*0.2, // left turn
    state[0]*0.2 + state[5]*0.2, // right turn
    state[1]*0.5               // jump
  ];
}

// ======== STATE ========
function getState(){
  let dx = goal.position.x - agent.x;
  let dy = goal.position.y - agent.y;
  let dz = goal.position.z - agent.z;
  return [dx, dy, dz, agent.vx, agent.vy, agent.vz];
}

// ======== ACTION ========
function act(output){
  let action = output.indexOf(Math.max(...output));
  if(action===0) { agent.vx += Math.cos(0)*0.05; agent.vz += Math.sin(0)*0.05; }
  if(action===1) agent.x -= 0.05;
  if(action===2) agent.x += 0.05;
  if(action===3 && agent.onGround) agent.vy = 0.25;
}

// ======== PHYSICS ========
function physics(){
  agent.vy -= 0.01; // gravity
  agent.x += agent.vx;
  agent.y += agent.vy;
  agent.z += agent.vz;

  agent.vx *= 0.95; agent.vz *= 0.95;

  agent.onGround = false;
  for(let p of platforms){
    if(Math.abs(agent.x - p.position.x)<1 && Math.abs(agent.z - p.position.z)<1 && agent.y <= p.position.y +1){
      agent.y = p.position.y +1;
      agent.vy = 0;
      agent.onGround = true;
    }
  }
}

// ======== REWARD ========
function reward(){
  let d = Math.hypot(goal.position.x-agent.x, goal.position.y-agent.y, goal.position.z-agent.z);
  if(agent.y < -5) return -50; // death
  if(d < 1) return 100; // win
  return -d*0.01; // small progress reward
}

// ======== RESET ========
function reset(){
  agent = {x:0,y:2,z:0,vx:0,vy:0,vz:0,onGround:false};
}

// ======== UPDATE ========
function update(){
  if(training){
    let state = getState();
    let out = simpleQ(state);
    act(out);
    physics();
    let r = reward();
    if(r>50 || r<-40) reset(); // only reset on win/death
  }
  cube.position.set(agent.x, agent.y, agent.z);
  camera.position.lerp(new THREE.Vector3(agent.x+5, agent.y+5, agent.z+5),0.05);
  camera.lookAt(cube.position);
}

// ======== ANIMATE ========
function animate(){
  requestAnimationFrame(animate);
  update();
  renderer.render(scene,camera);
}
animate();

// ======== RESIZE ========
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
