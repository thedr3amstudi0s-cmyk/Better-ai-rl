<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D RL AI (Stable)</title>

<style>
body { margin:0; background:#000; color:white; font-family:Arial; overflow:hidden; }

#ui {
  position:fixed;
  top:10px;
  left:10px;
  right:10px;
  background:rgba(0,0,0,0.7);
  padding:10px;
  border-radius:10px;
}

#stats { margin-top:6px; }

#bars {
  display:flex;
  gap:4px;
  margin-top:6px;
}
.bar {
  flex:1;
  background:#333;
  height:40px;
  position:relative;
}
.bar div {
  position:absolute;
  bottom:0;
  width:100%;
  background:lime;
}

canvas#graph {
  width:100%;
  height:80px;
  margin-top:6px;
  background:#111;
}

button {
  padding:8px;
  margin-right:5px;
}
</style>

</head>

<body>

<div id="ui">
  <button onclick="toggleTraining()">Start/Stop</button>
  <button onclick="resetAll()">Reset</button>

  <div id="stats"></div>

  <div id="bars">
    <div class="bar"><div id="b0"></div></div>
    <div class="bar"><div id="b1"></div></div>
    <div class="bar"><div id="b2"></div></div>
  </div>

<canvas id="graph"></canvas>

</div>

<canvas id="game"></canvas>

<script>
// ============================
// SETUP
// ============================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// ============================
// WORLD (3D simulated)
// ============================
const SIZE = 400;
const DEPTH = 200; // fake height

const AGENT_COUNT = 20;

let goal = { x:200, y:200 };

// ============================
// AGENTS
// ============================
const agents = [];

function createAgent(){
  return {
    x:200,
    y:200,
    z:0,
    vy:0,
    angle:Math.random()*Math.PI*2,
    speed:2
  };
}

for(let i=0;i<AGENT_COUNT;i++) agents.push(createAgent());

// ============================
// RL
// ============================
let Q = {};
const actions = ["forward","left","right"];

let alpha=0.12, gamma=0.9, epsilon=0.3;
let training = true;

function toggleTraining(){ training=!training; }

function resetAgent(a){
  a.x=200; a.y=200; a.z=0; a.vy=0;
}

function resetAll(){
  agents.forEach(resetAgent);
  goal.x=Math.random()*SIZE;
  goal.y=Math.random()*SIZE;
}

// ============================
// STATE
// ============================
function getState(a){
  let dx=goal.x-a.x;
  let dy=goal.y-a.y;
  let dist=Math.hypot(dx,dy);
  let diff=Math.atan2(dy,dx)-a.angle;

  let lookX=a.x+Math.cos(a.angle)*20;
  let lookY=a.y+Math.sin(a.angle)*20;

  let danger=(lookX<0||lookX>SIZE||lookY<0||lookY>SIZE)?1:0;

  return `${Math.round(dist/20)}_${Math.round(diff*4)}_${danger}`;
}

function chooseAction(state){
  if(Math.random()<epsilon) return actions[Math.floor(Math.random()*3)];
  let qs=Q[state]||{};
  return actions.reduce((a,b)=>(qs[a]||0)>(qs[b]||0)?a:b);
}

// ============================
// STEP
// ============================
function step(a,action){
  let prevDist=Math.hypot(goal.x-a.x,goal.y-a.y);

  if(action==="left") a.angle-=0.2;
  if(action==="right") a.angle+=0.2;

  if(action==="forward"){
    a.x+=Math.cos(a.angle)*a.speed;
    a.y+=Math.sin(a.angle)*a.speed;
  }

  let newDist=Math.hypot(goal.x-a.x,goal.y-a.y);

  let reward=(prevDist-newDist)*3;

  let diff=Math.abs(Math.atan2(goal.y-a.y,goal.x-a.x)-a.angle);
  reward+=(Math.PI-diff);

  // edge warning
  if(a.x<10||a.x>SIZE-10||a.y<10||a.y>SIZE-10) reward-=3;

  // FALL OFF EDGE → 3D fall
  if(a.x<0||a.x>SIZE||a.y<0||a.y>SIZE){
    a.vy += 0.5;
    a.z += a.vy;

    if(a.z > DEPTH){
      return {reward:-50, done:true};
    }
    return {reward:-5, done:false};
  }

  if(newDist<10){
    return {reward:50, done:true};
  }

  return {reward, done:false};
}

// ============================
// GRAPH
// ============================
const graph=document.getElementById("graph");
const gctx=graph.getContext("2d");

function resizeGraph(){
  graph.width=graph.clientWidth;
  graph.height=graph.clientHeight;
}
resizeGraph();
window.addEventListener("resize",resizeGraph);

let rewards=[];
let avgRewards=[];

function drawGraph(){
  gctx.clearRect(0,0,graph.width,graph.height);

  // instant reward (spiky)
  gctx.beginPath();
  for(let i=0;i<rewards.length;i++){
    let y=graph.height-rewards[i];
    if(i===0) gctx.moveTo(i,y);
    else gctx.lineTo(i,y);
  }
  gctx.strokeStyle="lime";
  gctx.stroke();

  // avg reward (smooth)
  gctx.beginPath();
  for(let i=0;i<avgRewards.length;i++){
    let y=graph.height-avgRewards[i];
    if(i===0) gctx.moveTo(i,y);
    else gctx.lineTo(i,y);
  }
  gctx.strokeStyle="cyan";
  gctx.stroke();
}

// ============================
// LOOP
// ============================
let episodes=0;
let lastQ={};

function update(){
  if(!training) return;

  let totalReward=0;

  agents.forEach(a=>{
    let s=getState(a);
    let act=chooseAction(s);

    let res=step(a,act);
    let s2=getState(a);

    if(!Q[s]) Q[s]={};

    let old=Q[s][act]||0;
    let nextMax=Q[s2]?Math.max(...actions.map(x=>Q[s2][x]||0)):0;

    Q[s][act]=old+alpha*(res.reward+gamma*nextMax-old);

    lastQ=Q[s];

    totalReward+=res.reward;

    if(res.done){
      episodes++;
      resetAgent(a);
    }
  });

  let avg=totalReward/AGENT_COUNT;

  rewards.push(avg);
  if(rewards.length>graph.width) rewards.shift();

  avgRewards.push(
    avgRewards.length>0 ? avgRewards[avgRewards.length-1]*0.9 + avg*0.1 : avg
  );
  if(avgRewards.length>graph.width) avgRewards.shift();

  epsilon*=0.999;
}

// ============================
// DRAW
// ============================
function draw(){
  ctx.fillStyle="#111";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // platform
  ctx.strokeStyle="#444";
  ctx.strokeRect(0,0,SIZE,SIZE);

  // goal
  ctx.fillStyle="lime";
  ctx.fillRect(goal.x,goal.y,10,10);

  // agents
  agents.forEach(a=>{
    ctx.fillStyle = a.z>0 ? "red" : "cyan";
    ctx.fillRect(a.x,a.y,6,6);
  });
}

// ============================
// UI
// ============================
function updateUI(){
  document.getElementById("stats").innerHTML =
    `Agents: ${AGENT_COUNT} | Episodes: ${episodes}`;

  let vals = ["forward","left","right"].map(a=>lastQ[a]||0);
  let max = Math.max(...vals,1);

  vals.forEach((v,i)=>{
    document.getElementById("b"+i).style.height = (v/max*40)+"px";
  });
}

// ============================
// MAIN LOOP
// ============================
function loop(){
  update();
  draw();
  drawGraph();
  updateUI();
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
